<div class="compare-container">
  <h2>⚖️ Compare Insurance Offers</h2>

  <div class="form-group">
    <label>Offer IDs (comma-separated)</label>
    <input [(ngModel)]="offerIdsInput" placeholder="abc-123, def-456" class="input-field" />
  </div>

  <div class="form-group">
    <label>Aspects to Compare (comma-separated)</label>
    <input [(ngModel)]="aspectsInput" placeholder="dental coverage, vision, hospitalization" class="input-field" />
  </div>

  <button (click)="compare()" [disabled]="isLoading" class="btn-primary">
    {{ isLoading ? 'Comparing…' : 'Compare' }}
  </button>

  <div *ngIf="error" class="error">{{ error }}</div>

  <!-- Results table -->
  <div *ngIf="comparison" class="results">
    <table class="compare-table">
      <thead>
        <tr>
          <th>Aspect</th>
          <th *ngFor="let id of offerIds">{{ id | slice:0:12 }}…</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let aspect of aspects">
          <td class="aspect-cell">{{ aspect }}</td>
          <td *ngFor="let id of offerIds" class="snippet-cell">
            <ng-container *ngIf="comparison[aspect] && comparison[aspect][id] !== null && comparison[aspect][id] !== undefined; else noData">
              {{ comparison[aspect][id] }}
            </ng-container>
            <ng-template #noData>
              <span class="badge-missing">No data</span>
            </ng-template>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
