<div class="recommend-container">
  <h2>🎯 Get a Recommendation</h2>
  <div class="form-group">
    <label>Describe your insurance needs</label>
    <textarea
      [(ngModel)]="criteriaInput"
      rows="4"
      class="textarea-field"
      placeholder="e.g. Family of four, need dental and vision coverage, budget around €200/month"
    ></textarea>
  </div>
  <button (click)="recommend()" [disabled]="isLoading" class="btn-primary">
    {{ isLoading ? 'Searching…' : 'Find Best Match' }}
  </button>

  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="recommendations.length > 0" class="results">
    <h3>Recommendations</h3>
    <div *ngFor="let rec of recommendations; let i = index" class="rec-card">
      <div class="rec-header">
        <span class="rank-badge">#{{ i + 1 }}</span>
        <span class="offer-id">{{ rec.offerId }}</span>
      </div>
      <p class="reason">{{ rec.reason }}</p>
      <div *ngIf="rec.citations.length > 0" class="citations">
        <div class="citations-label">Supporting sources:</div>
        <div *ngFor="let c of rec.citations" class="citation-item">
          <span class="cite-page">p.{{ c.page }}</span>
          <span class="cite-excerpt">{{ c.excerpt }}</span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading && recommendations.length === 0 && !error" class="empty">
    Enter your criteria above and click "Find Best Match" to get personalised recommendations.
  </div>
</div>
