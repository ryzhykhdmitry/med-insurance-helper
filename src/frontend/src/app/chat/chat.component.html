<div class="chat-container">
  <div class="chat-header">
    <h2>🏥 Medical Insurance Assistant</h2>
    <button class="btn-clear" (click)="clearChat()" title="New conversation">New Chat</button>
  </div>

  <!-- Message list -->
  <div class="message-list">
    <div
      *ngFor="let msg of messages"
      class="message"
      [class.user-message]="msg.role === 'user'"
      [class.assistant-message]="msg.role === 'assistant'"
    >
      <div class="message-role">{{ msg.role === 'user' ? 'You' : 'Assistant' }}</div>

      <!-- Loading indicator while awaiting response -->
      <div *ngIf="msg.isLoading" class="message-text">
        <span class="cursor">▌</span>
      </div>

      <!-- Multi-section response (comparison / recommendation / answer / clarification) -->
      <ng-container *ngIf="!msg.isLoading && msg.sections && msg.sections.length > 0">
        <div *ngFor="let section of msg.sections" class="response-section" [attr.data-type]="section.type">
          <div class="section-label">{{ sectionLabel(section.type) }}</div>
          <div class="section-content">{{ section.content }}</div>
        </div>
      </ng-container>

      <!-- Fallback plain text (user messages and legacy) -->
      <div *ngIf="!msg.isLoading && (!msg.sections || msg.sections.length === 0)" class="message-text">
        {{ msg.text }}
      </div>
    </div>

    <!-- Global loading spinner (before placeholder is added) -->
    <div *ngIf="isLoading && messages[messages.length - 1]?.isLoading === false" class="loading">
      <span class="dot-flashing"></span>
    </div>

    <div *ngIf="messages.length === 0" class="empty-state">
      Ask anything about insurance — compare plans, get a recommendation, or ask a general question.
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <textarea
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      placeholder="e.g. Compare Alpha and Gamma plans, or recommend a plan for a family of 4…"
      rows="2"
      [disabled]="isLoading"
    ></textarea>
    <button
      class="btn-send"
      (click)="send()"
      [disabled]="isLoading || !inputText.trim()"
    >
      {{ isLoading ? '…' : 'Send' }}
    </button>
  </div>
</div>
